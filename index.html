<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; --gold: #FFD700; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 勳章與狀態樣式 */
        .streak-badge { background: linear-gradient(135deg, var(--gold), #FFA500); color: #8B4513; padding: 8px 15px; border-radius: 50px; font-weight: 900; font-size: 18px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 8px 15px; border-radius: 12px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; border: 1px solid #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; border: 1px solid #C62828; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); position: relative; }
        .ai-bubble { font-size: 30px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 5px; font-weight: 900; color: #333; line-height: 1.2; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        .btn-outline { background: white; border: 2.5px solid var(--primary-orange); color: var(--primary-orange); padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; flex: 1; cursor: pointer; }

        #safety-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFDD0; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px; }
        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 42%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div style="font-size:26px; font-weight:bold; margin-bottom:20px;">忙緊嗎？❤️<br>我幫您同家人報平安...</div>
        <div id="timer-num" style="font-size:60px; font-weight:900; color:var(--wa-green); margin-bottom:30px;">5</div>
        <button onclick="stopSafetyAlert()" style="padding:15px 30px; border-radius:15px; font-size:20px; font-weight:bold; border:none; background:#ccc; color:white;">等陣先</button>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 6px 12px; border-radius: 10px; cursor: pointer;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="streak-box" class="streak-badge">
                <span>🔥 連續紀錄 0 天</span>
            </div>
            
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            
            <div id="health-tip" class="health-status">載入中...</div>
            <br>
            <div id="last-record" style="margin-top:10px; font-size:18px; color:#666; font-weight:bold;">上次：--/--</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 5px;">
                <div><label style="display:block; font-weight:bold; color:#666;">上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div><label style="display:block; font-weight:bold; color:#666;">下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:12px; width:100%;">
            <button class="btn-outline" onclick="alert('圖表生成中...')">📊 一週圖表</button>
            <button class="btn-outline" onclick="alert('月報生成中...')">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')" style="cursor: pointer; color: var(--primary-orange);">⬅️ 返回主頁</h2>
            <hr>
            <p>您的稱呼：<input type="text" id="u-name" style="width:100%;"></p>
            <p>家人 WhatsApp：<input type="tel" id="family-tel" style="width:100%;"></p>
            <p>提醒時間：<input type="time" id="deadline-time" style="width:100%;"></p>
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存</button>
        </div>
    </div>

    <script>
        let countdownTimer = null;
        let isAlerting = false;

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            updateStats();
        }

        function saveSets() {
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value,
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            }));
            showPage('home-page');
        }

        function logBP() {
            const sys = parseInt(document.getElementById('sys').value);
            const dia = parseInt(document.getElementById('dia').value);
            if(!sys || !dia) return alert("請輸入數值");
            
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({sys: sys, dia: dia, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            stopSafetyAlert();
            updateStats();
        }

        function calculateStreak(logs) {
            if (logs.length === 0) return 0;
            let streak = 0;
            let today = new Date();
            today.setHours(0,0,0,0);
            
            let dateSet = new Set(logs.map(l => {
                let d = new Date(l.d);
                d.setHours(0,0,0,0);
                return d.getTime();
            }));

            let checkDate = today;
            while(dateSet.has(checkDate.getTime())) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            return streak;
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{"name":"","deadline":"12:00"}');
            let todayStr = new Date().toDateString();
            let hasToday = logs.some(l => new Date(l.d).toDateString() === todayStr);
            
            // 1. 更新連續天數
            const streak = calculateStreak(logs);
            document.getElementById('streak-box').innerHTML = `<span>🔥 連續紀錄 ${streak} 天</span>`;
            if(streak >= 7) document.getElementById('streak-box').style.background = "linear-gradient(135deg, #FFD700, #FF4500)";

            // 2. 更新健康提示與數據
            const last = logs[logs.length-1];
            const tipEl = document.getElementById('health-tip');
            if (last) {
                document.getElementById('last-record').innerText = `上次：${last.sys}/${last.dia}`;
                if (last.sys > 140 || last.dia > 90) {
                    tipEl.innerText = "⚠️ 血壓偏高，休息下再量呀";
                    tipEl.className = "health-status status-warn";
                } else {
                    tipEl.innerText = "✨ 血壓好靚，繼續保持！";
                    tipEl.className = "health-status status-normal";
                }
            }
