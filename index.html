<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 溫和提醒覆蓋層 */
        #safety-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #FFFDD0; z-index: 3000; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px;
        }
        .gentle-msg { font-size: 28px; font-weight: bold; color: #444; line-height: 1.5; margin-bottom: 30px; }
        .countdown { font-size: 50px; font-weight: 900; color: var(--wa-green); margin-bottom: 30px; }
        .btn-stop { background: #bbb; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 20px; font-weight: bold; }

        /* 主介面樣式 */
        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 32px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 12px; font-weight: 900; color: #333; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 24px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        
        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 40%; margin-bottom: 10px; }
        label { font-size: 18px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div class="gentle-msg">
            忙緊嗎？❤️<br>仲未紀錄，<br>我幫您同家人報平安...
        </div>
        <div id="timer-num" class="countdown">5</div>
        <button class="btn-stop" onclick="stopSafetyAlert()">等陣，我而家量</button>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 5px 10px; border-radius: 10px;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record" style="color: var(--primary-orange); font-weight: bold; font-size: 20px;">載入中...</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around;">
                <div><label>上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div><label>下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 回報平安</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')">⬅️ 返回</h2>
            <p>您的稱呼：<br><input type="text" id="u-name" style="width:90%;"></p>
            <p>家人 WhatsApp：<br><input type="tel" id="family-tel" style="width:90%;"></p>
            <p>提醒時間：<br><input type="time" id="deadline-time" style="width:90%;"></p>
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存</button>
        </div>
    </div>

    <script>
        let timer = null;
        let isAlerting = false;

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
            updateStats();
        }

        function saveSets() { 
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value, 
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            })); 
            showPage('home-page'); 
        }

        function logBP() {
            const s = document.getElementById('sys').value, d = document.getElementById('dia').value;
            if(!s || !d) return alert("請輸入數值");
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({sys: s, dia: d, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            stopSafetyAlert();
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            let today = new Date().toDateString();
            let hasToday = logs.some(l => new Date(l.d).toDateString() === today);
            
            if (!hasToday && !isAlerting) {
                let now = new Date();
                let cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                if (cur >= (s.deadline || "12:00")) startSafetyAlert();
            }

            const last = logs[logs.length-1];
            document.getElementById('last-record').innerText = last ? `上次：${last.sys}/${last.dia}` : "尚未紀錄";
            document.getElementById('ai-msg').innerText = hasToday ? `做得好，${s.name || ''}！` : `早晨，${s.name || ''}！`;
        }

        function startSafetyAlert() {
            isAlerting = true;
            document.getElementById('safety-overlay').style.display = 'flex';
            let sec = 5;
            timer = setInterval(() => {
                sec--;
                document.getElementById('timer-num').innerText = sec;
                if (sec <= 0) {
                    clearInterval(timer);
                    sendWA();
                }
            }, 1000);
        }

        function stopSafetyAlert() {
            isAlerting = false;
            clearInterval(timer);
            document.getElementById('safety-overlay').style.display = 'none';
        }

        function sendWA() {
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            // 簡短訊息方案
            const msg = `今日${s.name || '長輩'}忙緊，遲啲量，我好好，放心！❤️`;
            window.open(`https://wa.me/${s.familyTel || ''}?text=${encodeURIComponent(msg)}`);
            stopSafetyAlert();
        }

        function quickShareToday() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const last = logs[logs.length-1];
            if(!last) return;
            const msg = `${s.name || '長輩'}今日血壓：${last.sys}/${last.dia}，放心！`;
            window.open(`https://wa.me/${s.familyTel || ''}?text=${encodeURIComponent(msg)}`);
        }

        // 啟動
        let saved = JSON.parse(localStorage.getItem('warm_sets') || '{}');
        document.getElementById('u-name').value = saved.name || '';
        document.getElementById('family-tel').value = saved.familyTel || '';
        document.getElementById('deadline-time').value = saved.deadline || '12:00';
        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
