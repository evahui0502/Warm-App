<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; --warn-red: #d32f2f; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        .header-row { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-settings-text { color: var(--primary-orange); font-weight: bold; font-size: 20px; border: 2.5px solid var(--primary-orange); padding: 8px 18px; border-radius: 15px; background: white; }

        .card { background: var(--card-white); border-radius: 26px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 20px; width: calc(100% - 50px); }
        
        .ai-bubble { font-size: 32px; border-left: 10px solid var(--primary-orange); padding-left: 18px; margin-bottom: 15px; font-weight: 900; color: #333; line-height: 1.3; }
        
        /* 🚨 自動逾時提醒按鈕 */
        .missed-alert-btn { background: var(--sos-red); color: white; padding: 20px; border-radius: 20px; font-weight: 900; font-size: 24px; margin-bottom: 20px; text-align: center; display: none; border: none; width: 100%; box-shadow: 0 10px 20px rgba(255,75,43,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        input { font-size: 34px; padding: 18px; border-radius: 18px; border: 3px solid var(--accent-blue); text-align: center; width: 85%; align-self: center; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 26px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }

        .sos-btn { position: fixed; bottom: 35px; right: 25px; width: 105px; height: 105px; background: var(--sos-red); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 28px; font-weight: 900; z-index: 100; box-shadow: 0 10px 30px rgba(255,75,43,0.5); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header-row">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 34px;">溫暖守護</h1>
            <div class="btn-settings-text" onclick="showPage('settings-page')">⚙️ 設定中心</div>
        </div>

        <button id="family-alert-btn" class="missed-alert-btn" onclick="sendFamilyAlert()">
            🚨 通知家人我未紀錄
        </button>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record-time" style="color: var(--primary-orange); font-weight: bold; font-size: 22px;">載入中...</div>
        </div>

        <div class="card">
            <div class="input-row">
                <div class="input-group"><label style="font-size:18px;font-weight:bold;margin-bottom:5px;">上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div class="input-group"><label style="font-size:18px;font-weight:bold;margin-bottom:5px;">下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 WhatsApp 回報平安</button>
        </div>

        <div style="display:flex; gap:15px; width:100%;">
            <button style="flex:1; padding:20px; border-radius:15px; border:2px solid orange; background:white; color:orange; font-weight:bold; font-size:20px;" onclick="openReport(7)">📊 一週圖表</button>
            <button style="flex:1; padding:20px; border-radius:15px; border:2px solid orange; background:white; color:orange; font-weight:bold; font-size:20px;" onclick="openReport(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="header-row"><h2 onclick="showPage('home-page')" style="cursor:pointer">⬅️ 返回主頁</h2></div>
        <div class="card">
            <h3 style="color: var(--primary-orange); margin-top:0;">提醒與家人設定</h3>
            
            <label style="display:block; margin-bottom:10px; font-weight:bold; font-size: 20px;">點樣稱呼您？</label>
            <input type="text" id="u-name" style="width:90%; font-size:24px; margin-bottom:20px;" placeholder="例如：阿娟">

            <label style="display:block; margin-bottom:10px; font-weight:bold; font-size: 20px;">家人 WhatsApp 電話</label>
            <input type="tel" id="family-tel" style="width:90%; font-size:24px; margin-bottom:20px;" placeholder="例如：91234567">

            <label style="display:block; margin-bottom:10px; font-weight:bold; font-size: 20px;">每日 Check-in 期限</label>
            <input type="time" id="deadline-time" style="width:90%; font-size:24px; margin-bottom:20px;">
            
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存設定</button>
        </div>
    </div>

    <div id="sos" class="sos-btn" onclick="triggerSOS()">SOS</div>

    <script>
        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
            if(p==='settings-page') loadSets(); 
            updateStats();
        }

        function saveSets() { 
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value, 
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            })); 
            showPage('home-page'); 
        }

        function loadSets() { 
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}'); 
            document.getElementById('u-name').value = s.name || ''; 
            document.getElementById('family-tel').value = s.familyTel || '';
            document.getElementById('deadline-time').value = s.deadline || '12:00';
        }

        function logBP() {
            const sys = document.getElementById('sys').value, dia = document.getElementById('dia').value;
            if(!sys || !dia) return alert("請輸入數值");
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({sys: sys, dia: dia, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("紀錄成功！💪");
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            let today = new Date().toDateString();
            let hasToday = logs.some(l => new Date(l.d).toDateString() === today);
            
            // 檢查是否逾時
            const alertBtn = document.getElementById('family-alert-btn');
            if (!hasToday) {
                let now = new Date();
                let currentTime = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                if (currentTime >= (s.deadline || "12:00")) {
                    alertBtn.style.display = 'block';
                } else {
                    alertBtn.style.display = 'none';
                }
            } else {
                alertBtn.style.display = 'none';
            }

            const last = logs[logs.length-1];
            document.getElementById('last-record-time').innerText = last ? `最後紀錄：${new Date(last.d).getHours()}:${new Date(last.d).getMinutes().toString().padStart(2,'0')} (${last.sys}/${last.dia})` : "尚未有紀錄";
            document.getElementById('ai-msg').innerText = hasToday ? `今日做得好，${s.name || ''}！` : `早晨呀${s.name || ''}！量咗血壓未？`;
        }

        // 核心功能：逾時一鍵通知家人
        function sendFamilyAlert() {
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const name = s.name || "長輩";
            const tel = s.familyTel;
            const msg = `【溫暖守護】健康提醒：今日${name}未 Check-in 啊，記得關心下佢！`;
            
            if (!tel) {
                alert("請先到設定中心填寫家人電話呀！");
                showPage('settings-page');
                return;
            }
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
        }

        function quickShareToday() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const last = logs[logs.length-1];
            if(!last) return alert("仲未有紀錄");
            const msg = `【溫暖守護】今日回報\n${s.name || '長輩'} 最新血壓：${last.sys}/${last.dia}\n大家放心！`;
            window.open(`https://wa.me/${s.familyTel || ''}?text=${encodeURIComponent(msg)}`);
        }

        function triggerSOS() {
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            window.location.href = `tel:999`;
        }
        
        loadSets();
        updateStats();
        // 每分鐘自動檢查一次時間
        setInterval(updateStats, 60000);
    </script>
</body>
</html>
