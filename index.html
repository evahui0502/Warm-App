<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 溫和倒數覆蓋層 */
        #safety-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #FFFDD0; z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px;
        }
        .gentle-msg { font-size: 26px; font-weight: bold; color: #444; line-height: 1.5; margin-bottom: 25px; }
        .countdown { font-size: 60px; font-weight: 900; color: var(--wa-green); margin-bottom: 30px; }
        .btn-stop { background: #bbb; color: white; border: none; padding: 18px 35px; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* 主介面 */
        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 30px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 12px; font-weight: 900; color: #333; line-height: 1.2; }
        .last-record-box { color: var(--primary-orange); font-weight: bold; font-size: 20px; background: #FFF9E6; padding: 10px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        .btn-outline { background: white; border: 2.5px solid var(--primary-orange); color: var(--primary-orange); padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; flex: 1; cursor: pointer; }

        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 42%; margin-bottom: 10px; }
        label { font-size: 18px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }

        /* 圖表彈窗 */
        #chart-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; width: 90%; max-width: 440px; border-radius: 25px; padding: 20px; position: relative; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div class="gentle-msg">忙緊嗎？❤️<br>仲未紀錄，<br>我幫您同家人報平安...</div>
        <div id="timer-num" class="countdown">5</div>
        <button class="btn-stop" onclick="stopSafetyAlert()">等陣，我而家量</button>
    </div>

    <div id="chart-modal" onclick="closeChart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="chart-title" style="text-align:center; color: var(--primary-orange); margin-top:0;">健康趨勢</h3>
            <canvas id="healthChart"></canvas>
            <button class="btn-main" style="margin-top:20px; background:#666;" onclick="closeChart()">關閉圖表</button>
        </div>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 6px 12px; border-radius: 10px; cursor: pointer;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record" class="last-record-box">載入數據中...</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 5px;">
                <div><label>上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div><label>下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:12px; width:100%;">
            <button class="btn-outline" onclick="openChart(7)">📊 一週圖表</button>
            <button class="btn-outline" onclick="openChart(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')" style="cursor: pointer; color: var(--primary-orange);">⬅️ 返回主頁</h2>
            <hr>
            <label>點樣稱呼您？</label>
            <input type="text" id="u-name" style="width:90%; font-size:24px; margin-bottom:15px;">
            <label>家人 WhatsApp</label>
            <input type="tel" id="family-tel" style="width:90%; font-size:24px; margin-bottom:15px;">
            <label>每日提醒時間</label>
            <input type="time" id="deadline-time" style="width:90%; font-size:24px; margin-bottom:15px;">
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存</button>
        </div>
    </div>

    <script>
        let myChart = null;
        let countdownTimer = null;
        let isAlerting = false;

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if (p === 'settings-page') loadSets();
            updateStats();
        }

        function saveSets() {
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value,
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            }));
            alert("儲存成功！");
            showPage('home-page');
        }

        function loadSets() {
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{"name":"","familyTel":"","deadline":"12:00"}');
            document.getElementById('u-name').value = s.name || '';
            document.getElementById('family-tel').value = s.familyTel || '';
            document.getElementById('deadline-time').value = s.deadline || '12:00';
        }

        function logBP() {
            const s = document.getElementById('sys').value, d = document.getElementById('dia').value;
            if(!s || !d) return alert("請輸入數值");
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({sys: s, dia: d, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            stopSafetyAlert();
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{"deadline":"12:00"}');
            let hasToday = logs.some(l => new Date(l.d).toDateString() === new Date().toDateString());
            
            // 自動提醒邏輯
            if (!hasToday && !isAlerting && !sessionStorage.getItem('dismissed')) {
                let cur = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
                if (cur >= (s.deadline || "12:00")) startSafetyAlert();
            }

            const last = logs[logs.length-1];
            document.getElementById('last-record').innerText = last ? `上次：${last.sys}/${last.dia}` : "尚未紀錄";
            document.getElementById('ai-msg').innerText = hasToday ? `做得好，${s.name || ''}！` : `早晨，${s.name || ''}！`;
        }

        function startSafetyAlert() {
            isAlerting = true;
            document.getElementById('safety-overlay').style.display = 'flex';
            let sec = 5;
            countdownTimer = setInterval(() => {
                sec
