<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; --gold: #FFD700; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 勳章與狀態 */
        .streak-badge { background: linear-gradient(135deg, var(--gold), #FFA500); color: #8B4513; padding: 10px 20px; border-radius: 50px; font-weight: 900; font-size: 18px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 10px 15px; border-radius: 12px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; border: 2px solid #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; border: 2px solid #C62828; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }

        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 30px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 5px; font-weight: 900; color: #333; line-height: 1.2; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        .btn-outline { background: white; border: 3px solid var(--primary-orange); color: var(--primary-orange); padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; flex: 1; cursor: pointer; }

        input { font-size: 30px; padding: 12px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 42%; }
        
        /* 彈窗 */
        #chart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; width: 90%; padding: 20px; border-radius: 25px; text-align: center; }
        
        #safety-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFDD0; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div style="font-size:26px; font-weight:bold; margin-bottom:20px;">忙緊嗎？❤️<br>我幫您同家人報平安...</div>
        <div id="timer-num" style="font-size:60px; font-weight:900; color:var(--wa-green); margin-bottom:30px;">5</div>
        <button class="btn-main" style="background:#666;" onclick="stopSafetyAlert()">等陣先</button>
    </div>

    <div id="chart-modal">
        <div class="modal-content" id="report-area">
            <h3 id="chart-title" style="color:var(--primary-orange); margin:0;">數據報告</h3>
            <p id="report-info" style="font-weight:bold;"></p>
            <canvas id="healthChart"></canvas>
            <p style="font-size:12px; color:#999;">由《溫暖守護》App 生成</p>
        </div>
        <button class="btn-main" style="margin-top:15px; background:var(--wa-green);" onclick="shareReport()">💬 傳送報告給家人</button>
        <button class="btn-main" style="background:#666;" onclick="closeChart()">返回</button>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 6px 12px; border-radius: 10px; cursor: pointer;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="streak-box" class="streak-badge">🔥 連續紀錄 0 天</div>
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="health-tip" class="health-status">載入中...</div>
            <div id="last-record" style="margin-top:10px; font-size:18px; color:#777; font-weight:bold;">上次：--/--</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 10px;">
                <div><label style="display:block; font-weight:bold; color:#666;">上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div><label style="display:block; font-weight:bold; color:#666;">下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="handleQuickShare()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:12px; width:100%;">
            <button class="btn-outline" onclick="openChart(7)">📊 一週圖表</button>
            <button class="btn-outline" onclick="openChart(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')" style="cursor: pointer; color: var(--primary-orange);">⬅️ 返回主頁</h2>
            <hr>
            <p>您的稱呼：<br><input type="text" id="u-name" style="width:90%; font-size:24px;"></p>
            <p>家人 WhatsApp：<br><input type="tel" id="family-tel" style="width:90%; font-size:24px;"></p>
            <p>提醒時間：<br><input type="time" id="deadline-time" style="width:90%; font-size:24px;"></p>
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存</button>
        </div>
    </div>

    <script>
        let myChart = null;
        let countdownTimer = null;
        let isAlerting = false;

        function getSets() { return JSON.parse(localStorage.getItem('warm_sets') || '{"name":"","familyTel":"","deadline":"12:00"}'); }
        function getLogs() { return JSON.parse(localStorage.getItem('warm_logs') || '[]'); }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            updateStats();
        }

        function saveSets() {
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value,
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            }));
            alert("設定已儲存！");
            showPage('home-page');
        }

        function logBP() {
            const s = parseInt(document.getElementById('sys').value);
            const d = parseInt(document.getElementById('dia').value);
            if(!s || !d) return alert("請輸入數字呀！");
            
            let logs = getLogs();
            logs.push({ sys: s, dia: d, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            stopSafetyAlert();
            updateStats();
        }

        function updateStats() {
            const logs = getLogs();
            const s = getSets();
            const todayStr = new Date().toDateString();
            const hasToday = logs.some(l => new Date(l.d).toDateString() === todayStr);

            // 1. 連續天數
            let streak = 0;
            let check = new Date();
            const dates = new Set(logs.map(l => new Date(l.d).toDateString()));
            while(dates.has(check.toDateString())) { streak++; check.setDate(check.getDate() - 1); }
            document.getElementById('streak-box').innerText = `🔥 連續紀錄 ${streak} 天`;

            // 2. 健康分析與異常提醒
            const last = logs[logs.length-1];
            const tipEl = document.getElementById('health-tip');
            if(last) {
                document.getElementById('last-record').innerText = `上次：${last.sys}/${last.dia}`;
                if(last.sys > 140 || last.dia > 90) {
                    tipEl.innerText = "⚠️ 血壓偏高，休息下再量呀";
                    tipEl.className = "health-status status-warn";
                } else {
                    tipEl.innerText = "✨ 血壓好靚，繼續保持！";
                    tipEl.className = "health-status status-normal";
                }
            }
            
            // 3. 超時提醒
            if(!hasToday && !isAlerting && !sessionStorage.getItem('skip')) {
                const now = new Date();
                const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                if(cur >= s.deadline) startSafetyAlert();
            }
            document.getElementById('ai-msg').innerText = hasToday ? `做得好，${s.name}！` : `早晨，${s.name}！`;
        }

        // 報平安按鈕邏輯：檢查今日是否有紀錄
        function handleQuickShare() {
            const logs = getLogs();
            const todayStr = new Date().toDateString();
            const todayLog = logs.find(l => new Date(l.d).toDateString() === todayStr);
            
            if(!todayLog) {
                alert("您今日仲未量血壓喎！請先量度並紀錄數據，再同家人報平安。❤️");
                document.getElementById('sys').focus();
            } else {
                sendWhatsAppRecord(todayLog);
            }
        }

        function sendWhatsAppRecord(log) {
            const s = getSets();
            let alertMsg = "";
            if(log.sys > 140 || log.dia > 90) {
                alertMsg = " (⚠️ 數據偏高，我會休息下再量)";
            }
            const msg = `${s.name}今日血壓：${log.sys}/${log.dia}${alertMsg}，放心！❤️`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        function startSafetyAlert() {
            isAlerting = true;
            document.getElementById('safety-overlay').style.display = 'flex';
            let sec = 5;
            countdownTimer = setInterval(() => {
                sec--;
                document.getElementById('timer-num').innerText = sec;
                if(sec <= 0) {
                    clearInterval(countdownTimer);
                    const s = getSets();
                    window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent("今日"+s.name+"忙緊，遲啲量，放心！❤️")}`);
                    stopSafetyAlert();
                }
            }, 1000);
        }

        function stopSafetyAlert() {
            isAlerting = false;
            clearInterval(countdownTimer);
            document.getElementById('safety-overlay').style.display = 'none';
            sessionStorage.setItem('skip', 'true');
        }

        /* --- 圖表與月報修復 --- */
        function openChart(days) {
            const logs = getLogs();
            const cutoff = Date.now() - (days * 86400000);
            const data = logs.filter(l => l.d >= cutoff);
            if(data.length < 2) return alert("數據不足，請多紀錄幾天再生成報告。");

            const s = getSets();
            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('chart-title').innerText = days === 7 ? "一週健康週報" : "月度健康報告";
            document.getElementById('report-info').innerText = `${s.name} 的數據 (${days}天)`;

            const ctx = document.getElementById('healthChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(l => new Date(l.d).toLocaleDateString('zh-HK', {month:'numeric', day:'numeric'})),
                    datasets: [
                        { label: '上壓', data: data.map(l => l.sys), borderColor: '#FF4B2B', tension: 0.3 },
                        { label: '下壓', data: data.map(l => l.dia), borderColor: '#87CEEB', tension: 0.3 }
                    ]
                }
            });
        }

        function shareReport() {
            const s = getSets();
            // 先發送文字，然後引導用戶截圖
            const msg = `這是 ${s.name} 的最新血壓趨勢報告。請查看下方圖表：`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
            
            // 使用 html2canvas 捕捉圖表區塊並提示用戶儲存
            html2canvas(document.querySelector("#report-area")).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = imgData;
                link.download = `健康報告_${new Date().toLocaleDateString()}.png`;
                link.click();
                alert("報告圖表已自動下載！請從手機相簿選擇圖片傳送給家人。");
            });
        }

        function closeChart() { document.getElementById('chart-modal').style.display = 'none'; }

        // 初始化
        const saved = getSets();
        document.getElementById('u-name').value = saved.name;
        document.getElementById('family-tel').value = saved.familyTel;
        document.getElementById('deadline-time').value = saved.deadline;
        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
