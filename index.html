<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護 6.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="溫暖守護">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* ... 保持原本的 CSS ... */
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <h2 style="color: var(--primary-orange); margin: 0;">溫暖守護</h2>
            <span style="font-size:32px;" onclick="showPage('settings-page')">⚙️</span>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！今日記低血壓數據未？</div>
            <div id="quick-stats" style="color:#888; font-size: 16px;">本週已紀錄 0 次數據</div>
        </div>

        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label>收縮壓 (上壓)</label>
                    <input type="number" id="sys" placeholder="120">
                </div>
                <div class="input-group">
                    <label>舒張壓 (下壓)</label>
                    <input type="number" id="dia" placeholder="80">
                </div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
        </div>

        <div style="display:flex; gap:12px; width:100%;">
            <button class="btn-report" onclick="openReport(7)">📊 睇本週圖表</button>
            <button class="btn-report" onclick="openReport(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div style="display:flex; align-items:center; margin-bottom: 20px;">
            <span style="font-size:24px; cursor:pointer;" onclick="showPage('home-page')">⬅️</span>
            <h2 style="margin: 0 0 0 15px;">設定中心</h2>
        </div>
        <div class="card">
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:8px; font-weight:bold;">家人接收 Email</label>
                <input type="email" id="f-email" style="width:90%; font-size:18px;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:8px; font-weight:bold;">您的稱呼 (如: 陳伯)</label>
                <input type="text" id="u-name" style="width:90%; font-size:18px;">
            </div>
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">儲存設定</button>
        </div>
    </div>

    <div id="report-overlay">
        <div id="report-content">
            <h3 id="report-title" style="text-align:center; color: var(--primary-orange); margin-top:0;">健康趨勢圖</h3>
            <canvas id="bpChart" width="400" height="300"></canvas>
            <div id="report-text" style="margin-top:20px; font-size:15px; white-space:pre-wrap; max-height:150px; overflow-y:auto; background:#f9f9f9; padding:10px; border-radius:10px;"></div>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <button class="btn-main" style="background:var(--primary-orange)" onclick="downloadPDF()">📥 轉 PDF 並發送 Email</button>
            <button class="btn-main" style="background:#888" onclick="closeReport()">返回首頁</button>
        </div>
    </div>

    <div id="sos" class="sos-btn">SOS
        <svg style="position:absolute" width="95" height="95"><circle class="circle" stroke-width="6" fill="transparent" r="44" cx="47.5" cy="47.5" transform="rotate(-90 47.5 47.5)"/></svg>
    </div>

    <script>
        let myChart = null;

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
            if(p==='settings-page') loadSets(); 
        }

        function saveSets() { 
            const name = document.getElementById('u-name').value;
            localStorage.setItem('warm_sets', JSON.stringify({email: document.getElementById('f-email').value, name: name})); 
            alert("設定已更新！");
            showPage('home-page'); 
            updateStats();
        }

        function loadSets() { 
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}'); 
            document.getElementById('f-email').value = s.email || ''; 
            document.getElementById('u-name').value = s.name || ''; 
        }

        function logBP() {
            const sys = document.getElementById('sys').value, dia = document.getElementById('dia').value;
            if(!sys || !dia) return alert("請先輸入上壓和下壓數值呀！");
            
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({t: '血壓', r: `${sys}/${dia}`, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            if(navigator.vibrate) navigator.vibrate(60);
            
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            document.getElementById('ai-msg').innerText = `記低咗喇${s.name || ''}！數值好清晰。`;
            
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let weekData = logs.filter(l=>l.d > Date.now()-7*86400000);
            document.getElementById('quick-stats').innerText = `本週已紀錄 ${weekData.length} 次數據`;
        }

        function openReport(days) {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const filtered = logs.filter(l => l.d > Date.now() - days*86400000);
            if(filtered.length === 0) return alert("暫時未有數據可以生成圖表。");

            document.getElementById('report-overlay').style.display = 'flex';
            document.getElementById('report-title').innerText = `${days===7?'本週':'本月'}血壓健康趨勢`;

            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filtered.map(l => new Date(l.d).toLocaleDateString()),
                    datasets: [{
                        label: '上壓 (SYS)',
                        data: filtered.map(l => l.r.split('/')[0]),
                        borderColor: '#FF4B2B', backgroundColor: 'rgba(255, 75, 43, 0.1)', fill: true, tension: 0.3
                    }, {
                        label: '下壓 (DIA)',
                        data: filtered.map(l => l.r.split('/')[1]),
                        borderColor: '#2196F3', backgroundColor: 'rgba(33, 150, 243, 0.1)', fill: true, tension: 0.3
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: false, suggestedMin: 40 } } }
            });

            let text = "數據清單：\n";
            filtered.forEach(l => text += `${new Date(l.d).toLocaleDateString()} : ${l.r}\n`);
            document.getElementById('report-text').innerText = text;
        }

        function closeReport() { document.getElementById('report-overlay').style.display = 'none'; }

        function downloadPDF() {
            const element = document.getElementById('report-content');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const opt = { margin: 10, filename: '健康報告.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            
            html2pdf().set(opt).from(element).save().then(() => {
                if(s.email) {
                    setTimeout(() => {
                        window.location.href = `mailto:${s.email}?subject=健康報告_${s.name || ''}&body=附件是我的 PDF 健康報告，請查收。`;
                    }, 500);
                } else {
                    alert("PDF 已下載！請到設定頁面填寫家人 Email 以便自動發送。");
                }
            });
        }

        // SOS 長按 2 秒
        const sos = document.getElementById('sos');
        let timer, start;
        sos.addEventListener('touchstart', (e) => {
            e.preventDefault(); start = Date.now();
            timer = setInterval(() => {
                let p = (Date.now() - start) / 2000;
                document.querySelector('.circle').style.strokeDashoffset = 283 - (Math.min(p, 1) * 283);
                if(p >= 1) { 
                    clearInterval(timer); 
                    let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
                    window.location.href = `tel:${s.phone || '999'}`; 
                }
            }, 50);
        });
        sos.addEventListener('touchend', () => { clearInterval(timer); document.querySelector('.circle').style.strokeDashoffset = 283; });

        updateStats();
    </script>
</body>

</html>
