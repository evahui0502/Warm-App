<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 溫和提醒覆蓋層 */
        #safety-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #FFFDD0; z-index: 3000; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px;
        }
        .gentle-msg { font-size: 28px; font-weight: bold; color: #444; line-height: 1.5; margin-bottom: 30px; }
        .countdown { font-size: 50px; font-weight: 900; color: var(--wa-green); margin-bottom: 30px; }
        .btn-stop { background: #bbb; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 20px; font-weight: bold; }

        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 32px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 12px; font-weight: 900; color: #333; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 24px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        
        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 40%; margin-bottom: 10px; }
        label { font-size: 18px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div class="gentle-msg">
            忙緊嗎？❤️<br>仲未紀錄，<br>我幫您同家人報平安...
        </div>
        <div id="timer-num" class="countdown">5</div>
        <button class="btn-stop" onclick="stopSafetyAlert()">等陣，我而家量</button>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 5px 10px; border-radius: 10px; cursor: pointer;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record" style="color: var(--primary-orange); font-weight: bold; font-size: 20px;">載入中...</div>
        </div>
