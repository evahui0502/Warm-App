<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --wa-green: #25D366; --gold: #FFD700; --card-white: #FFFFFF; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 12px; overflow-x: hidden; }
        .page { display: none; width: 100%; max-width: 480px; margin: auto; flex-direction: column; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: flex; }
        
        /* 勳章與 AI 訊息區 */
        .streak-badge { background: linear-gradient(135deg, var(--gold), #FFA500); color: #8B4513; padding: 10px 20px; border-radius: 50px; font-weight: 900; font-size: 22px; display: inline-flex; align-items: center; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(255,215,0,0.2); }
        .card { background: var(--card-white); border-radius: 25px; padding: 22px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(255,140,0,0.1); }
        .ai-bubble { font-size: 30px; border-left: 10px solid var(--primary-orange); padding-left: 15px; font-weight: bold; line-height: 1.3; color: #333; }
        
        /* 極簡輸入區 */
        .input-group { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1; text-align: center; }
        .input-box label { display: block; font-size: 20px; font-weight: bold; color: #666; margin-bottom: 8px; }
        input[type="number"], input[type="text"], input[type="tel"] { width: 100%; font-size: 32px; padding: 15px 0; border-radius: 15px; border: 3px solid #EEE; text-align: center; background: #F9F9F9; box-sizing: border-box; }
        input:focus { border-color: var(--primary-orange); background: #FFF; outline: none; }

        /* 動作按鈕 */
        .btn-main { width: 100%; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 26px; font-weight: bold; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-record { background: #87CEEB; box-shadow: 0 4px 0 #60A5C0; }
        .btn-record:active { transform: translateY(2px); box-shadow: none; }
        .btn-wa { background: var(--wa-green); box-shadow: 0 4px 0 #1EAC52; }
        .btn-wa:active { transform: translateY(2px); box-shadow: none; }
        
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 8px 15px; border-radius: 10px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; }

        /* 底部報表按鈕 */
        .report-btns { display: flex; gap: 10px; margin-top: 5px; }
        .btn-sub { flex: 1; background: white; border: 2px solid #DDD; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; color: #666; }
        
        /* 吐司提示 (代替 Alert) */
        #toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 50px; font-size: 18px; z-index: 999; display: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="home-page" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="color: var(--primary-orange); margin:0; font-size: 24px;">溫暖守護</h2>
            <button onclick="showPage('settings-page')" style="background:none; border:none; font-size: 26px;">⚙️</button>
        </div>

        <div class="card">
            <div id="streak-box" class="streak-badge">🔥 連續 0 天</div>
            <div id="ai-msg" class="ai-bubble">早晨！</div>
            <div id="health-tip" class="health-status">--</div>
            <div id="last-info" style="margin-top:10px; color:#999; font-size:16px;">尚未有紀錄</div>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-box">
                    <label>上壓</label>
                    <input type="number" id="sys" placeholder="0" oninput="if(value.length>=3)document.getElementById('dia').focus()">
                </div>
                <div class="input-box">
                    <label>下壓</label>
                    <input type="number" id="dia" placeholder="0">
                </div>
            </div>
            <button class="btn-main btn-record" onclick="doRecord()">✅ 記下血壓</button>
            <button class="btn-main btn-wa" onclick="doWhatsApp()">💬 報平安</button>
        </div>

        <div class="report-btns">
            <button class="btn-sub" onclick="sendReport(7)">📊 傳送周報</button>
            <button class="btn-sub" onclick="sendReport(30)">📅 傳送月報</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card" style="min-height: 85vh;">
            <div onclick="showPage('home-page')" style="font-size:24px; font-weight:bold; color:var(--primary-orange); margin-bottom:30px; cursor:pointer;">⬅️ 返回</div>
            
            <label style="font-size:22px; color:#333;">您的稱呼：</label>
            <input type="text" id="u-name" style="margin-bottom:30px; text-align: left; padding-left: 15px;">
            
            <label style="font-size:22px; color:#333;">家人 WhatsApp 電話：</label>
            <input type="tel" id="family-tel" placeholder="例如: 91234567" style="margin-bottom:30px; text-align: left; padding-left: 15px;">
            
            <button class="btn-main" style="background:#4CAF50;" onclick="doSave()">💾 儲存並返回</button>
        </div>
    </div>

    <script>
        const getL = () => JSON.parse(localStorage.getItem('warm_logs') || '[]').sort((a,b) => a.d - b.d);
        const getS = () => JSON.parse(localStorage.getItem('warm_sets') || '{"name":"用戶","familyTel":""}');

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(p === 'settings-page') {
                const s = getS();
                document.getElementById('u-name').value = s.name;
                document.getElementById('family-tel').value = s.familyTel;
            }
            ui();
        }

        function doSave() {
            const name = document.getElementById('u-name').value;
            const tel = document.getElementById('family-tel').value;
            if(!name || !tel) return showToast("請填寫完整喔！");
            localStorage.setItem('warm_sets', JSON.stringify({ name, familyTel: tel }));
            showPage('home-page');
            showToast("已儲存成功 ✨");
        }

        function doRecord() {
            const s = parseInt(document.getElementById('sys').value);
            const d = parseInt(document.getElementById('dia').value);
            if(!s || !d) return showToast("請輸入數字喔！");
            
            let logs = getL();
            logs.push({ sys: s, dia: d, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.activeElement.blur(); // 隱藏鍵盤
            
            showToast("記好喇！❤️");
            ui();
        }

        function ui() {
            const logs = getL();
            const s = getS();
            const last = logs[logs.length - 1];
            
            // 連續天數
            let streak = 0; let check = new Date();
            const logDates = new Set(logs.map(l => new Date(l.d).toDateString()));
            while(logDates.has(check.toDateString())) { streak++; check.setDate(check.getDate() - 1); }
            
            document.getElementById('streak-box').innerText = `🔥 連續 ${streak} 天`;
            document.getElementById('ai-msg').innerText = `早晨，${s.name || '您'}！`;
            
            if(last) {
                document.getElementById('last-info').innerText = `上次紀錄：${last.sys} / ${last.dia}`;
                const isH = (last.sys > 140 || last.dia > 90);
                document.getElementById('health-tip').innerText = isH ? "⚠️ 血壓偏高，休息一下" : "✨ 血壓好靚，繼續保持！";
                document.getElementById('health-tip').className = "health-status " + (isH ? "status-warn" : "status-normal");
            }
        }

        function doWhatsApp() {
            const logs = getL();
            const todayLogs = logs.filter(l => new Date(l.d).toDateString() === new Date().toDateString());
            if(todayLogs.length === 0) return showToast("請先記下今日數據喔！");
            const latest = todayLogs[todayLogs.length - 1];
            const s = getS();
            if(!s.familyTel) return showToast("請先設定家人電話。");
            
            const msg = `${s.name}今日血壓：${latest.sys}/${latest.dia}${ (latest.sys > 140 || latest.dia > 90) ? " (⚠️ 偏高)" : "" }，放心！❤️`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        function sendReport(days) {
            const logs = getL();
            const s = getS();
            const data = logs.filter(l => l.d >= Date.now() - (days * 86400000));
            if(data.length === 0) return showToast("暫未有數據。");

            let msg = `📊 ${s.name} 的健康${days==7?'週':'月'}報表：\n`;
            data.forEach(l => {
                const d = new Date(l.d).toLocaleDateString('zh-HK', {month:'short', day:'numeric'});
                msg += `${d}: ${l.sys}/${l.dia}\n`;
            });
            msg += `祝身體健康！❤️`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        ui();
    </script>
</body>
</html>
