<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 溫和提醒覆蓋層 */
        #safety-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #FFFDD0; z-index: 9999; 
            flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 25px;
        }
        .gentle-msg { font-size: 28px; font-weight: bold; color: #444; line-height: 1.5; margin-bottom: 30px; }
        .countdown { font-size: 60px; font-weight: 900; color: var(--wa-green); margin-bottom: 30px; }
        .btn-stop { background: #bbb; color: white; border: none; padding: 18px 35px; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }

        /* 主介面 */
        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 32px; border-left: 10px solid var(--primary-orange); padding-left: 15px; margin-bottom: 12px; font-weight: 900; color: #333; line-height: 1.2; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 26px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        
        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 42%; margin-bottom: 10px; }
        label { font-size: 18px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }

        .settings-input { width: 90% !important; margin-bottom: 20px !important; }
    </style>
</head>
<body>

    <div id="safety-overlay">
        <div class="gentle-msg">
            忙緊嗎？❤️<br>仲未紀錄，<br>我幫您同家人報平安...
        </div>
        <div id="timer-num" class="countdown">5</div>
        <button class="btn-stop" onclick="stopSafetyAlert()">等陣，我而家量</button>
    </div>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 32px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2.5px solid; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 18px;" onclick="showPage('settings-page')">⚙️ 設定中心</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record" style="color: var(--primary-orange); font-weight: bold; font-size: 22px; background: #FFF9E6; padding: 10px; border-radius: 10px; display: inline-block;">載入中...</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 10px;">
                <div><label>上壓</label><input type="number" id="sys" placeholder="120" inputmode="numeric"></div>
                <div><label>下壓</label><input type="number" id="dia" placeholder="80" inputmode="numeric"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 回報平安</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')" style="cursor: pointer; color: var(--primary-orange);">⬅️ 返回主頁</h2>
            <hr>
            <label>點樣稱呼您？</label>
            <input type="text" id="u-name" class="settings-input" placeholder="例如：阿娟">
            
            <label>家人 WhatsApp 電話</label>
            <input type="tel" id="family-tel" class="settings-input" placeholder="例如：91234567">
            
            <label>每日 Check-in 期限</label>
            <input type="time" id="deadline-time" class="settings-input">
            
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存設定</button>
        </div>
    </div>

    <script>
        let countdownValue = 5;
        let countdownInterval = null;
        let isAlertShowing = false;

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
            if (p === 'settings-page') {
                const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
                document.getElementById('u-name').value = s.name || '';
                document.getElementById('family-tel').value = s.familyTel || '';
                document.getElementById('deadline-time').value = s.deadline || '12:00';
            }
            updateStats();
        }

        function saveSets() { 
            const s = {
                name: document.getElementById('u-name').value, 
                familyTel: document.getElementById('family-tel').value,
                deadline: document.getElementById('deadline-time').value
            };
            localStorage.setItem('warm_sets', JSON.stringify(s)); 
            alert("設定已儲存！");
            showPage('home-page'); 
        }

        function logBP() {
            const sys = document.getElementById('sys').value;
            const dia = document.getElementById('dia').value;
            if(!sys || !dia) { alert("請填好數值先量呀！"); return; }
            
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({ sys: sys, dia: dia, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            
            if(isAlertShowing) stopSafetyAlert();
            updateStats();
        }

        function updateStats() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const todayStr = new Date().toDateString();
            const hasToday = logs.some(l => new Date(l.d).toDateString() === todayStr);
            
            // 檢查是否需要彈出提醒
            const now = new Date();
            const curTime = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
            const deadline = s.deadline || "12:00";

            // 如果今日未紀錄、目前超過期限、且現在沒在彈窗、且這節 session 沒被取消過
            if (!hasToday && curTime >= deadline && !isAlertShowing && !sessionStorage.getItem('alert_cancelled')) {
                startSafetyAlert();
            }

            const last = logs[logs.length - 1];
            document.getElementById('last-record').innerText = last ? `上次：${last.sys}/${last.dia}` : "尚未紀錄";
            document.getElementById('ai-msg').innerText = hasToday ? `做得好，${s.name || ''}！` : `早晨，${s.name || ''}！`;
        }

        function startSafetyAlert() {
            isAlertShowing = true;
            document.getElementById('safety-overlay').style.display = 'flex';
            countdownValue = 5;
            document.getElementById('timer-num').innerText = countdownValue;

            countdownInterval = setInterval(() => {
                countdownValue--;
                document.getElementById('timer-num').innerText = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    executeSend();
                }
            }, 1000);
        }

        function stopSafetyAlert() {
            isAlertShowing = false;
            clearInterval(countdownInterval);
            document.getElementById('safety-overlay').style.display = 'none';
            // 標記為本次開啟 App 期間不再自動彈出
            sessionStorage.setItem('alert_cancelled', 'true');
        }

        function executeSend() {
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const msg = `今日${s.name || '長輩'}忙緊，遲啲量，放心！❤️`;
            const tel = s.familyTel || '';
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
            stopSafetyAlert();
        }

        function quickShareToday() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const last = logs[logs.length-1];
            if(!last) { alert("仲未有紀錄喎！"); return; }
            const msg = `${s.name || '長輩'}今日血壓：${last.sys}/${last.dia}，放心！`;
            window.open(`https://wa.me/${s.familyTel || ''}?text=${encodeURIComponent(msg)}`);
        }

        // 初始化讀取
        const initSets = JSON.parse(localStorage.getItem('warm_sets') || '{}');
        if(!initSets.deadline) {
            localStorage.setItem('warm_sets', JSON.stringify({name:'', familyTel:'', deadline:'12:00'}));
        }

        updateStats();
        // 每 30 秒自動檢查一次
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
