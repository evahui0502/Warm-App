<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 450px; flex-direction: column; }
        .active { display: flex; }
        .card { background: var(--card-white); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; width: calc(100% - 40px); }
        .ai-bubble { font-size: 22px; border-left: 6px solid var(--primary-orange); padding-left: 12px; margin-bottom: 10px; font-weight: bold; }
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        .btn-report { background: white; border: 2px solid var(--primary-orange); color: var(--primary-orange); padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold; flex: 1; }
        #report-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        #report-content { background: white; width: 85%; max-width: 400px; padding: 20px; border-radius: 20px; }
        .sos-btn { position: fixed; bottom: 25px; right: 20px; width: 95px; height: 95px; background: var(--sos-red); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: 900; z-index: 100; box-shadow: 0 8px 20px rgba(255,75,43,0.4); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <h2 style="color: var(--primary-orange); align-self: flex-start;">溫暖守護 <span style="float:right; font-size:24px;" onclick="showPage('settings-page')">⚙️</span></h2>
        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record-time" style="color:#FF8C00; font-weight:bold; font-size:16px;">尚未紀錄</div>
        </div>

        <div class="card">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="number" id="sys" placeholder="上壓" style="flex:1; font-size:24px; padding:10px; border-radius:10px; border:2px solid #ddd;" inputmode="numeric">
                <input type="number" id="dia" placeholder="下壓" style="flex:1; font-size:24px; padding:10px; border-radius:10px; border:2px solid #ddd;" inputmode="numeric">
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 今日數據文字回報</button>
        </div>

        <div style="display:flex; gap:12px; width:100%;">
            <button class="btn-report" onclick="openReport(7)">📊 一週圖表報告</button>
            <button class="btn-report" onclick="openReport(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <h2 onclick="showPage('home-page')">⬅️ 設定中心</h2>
        <div class="card">
            <label>您的稱呼</label><input type="text" id="u-name" style="width:90%; margin-bottom:15px;">
            <label>緊急求助電話</label><input type="tel" id="sos-tel" style="width:90%; margin-bottom:15px;">
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存</button>
        </div>
    </div>

    <div id="report-overlay">
        <div id="report-content">
            <h3 id="report-title" style="text-align:center;">健康報告</h3>
            <canvas id="bpChart"></canvas>
            <div id="report-text" style="font-size:12px; background:#f9f9f9; padding:10px; margin-top:10px;"></div>
            <button id="share-pdf-btn" class="btn-main btn-wa-main" style="margin-top:15px;">📄 一鍵發送 PDF 報告</button>
            <button class="btn-main" style="background:#888" onclick="closeReport()">返回</button>
        </div>
    </div>

    <div id="sos" class="sos-btn">SOS</div>

    <script>
        let myChart = null;
        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diff = Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 86400000);
            const time = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return diff === 0 ? `今日 ${time}` : diff === 1 ? `尋日 ${time}` : `${d.getMonth()+1}/${d.getDate()} ${time}`;
        }

        function showPage(p) { document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        function saveSets() { localStorage.setItem('warm_sets', JSON.stringify({name: document.getElementById('u-name').value, tel: document.getElementById('sos-tel').value})); showPage('home-page'); }
        function loadSets() { let s = JSON.parse(localStorage.getItem('warm_sets') || '{}'); document.getElementById('u-name').value = s.name || ''; document.getElementById('sos-tel').value = s.tel || '999'; }

        function logBP() {
            const sys = document.getElementById('sys').value, dia = document.getElementById('dia').value;
            if(!sys || !dia) return;
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            logs.push({r: `${sys}/${dia}`, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const last = logs[logs.length-1];
            if(last) document.getElementById('last-record-time').innerText = `最後紀錄：${formatTime(last.d)} (${last.r})`;
        }

        function quickShareToday() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const last = logs[logs.length-1];
            if(!last) return alert("未有數據");
            const msg = `【溫暖守護】今日健康回報\n${s.name || '長輩'} 最後紀錄：${last.r}\n時間：${formatTime(last.d)}\n身體一切正常！`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function openReport(days) {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const filtered = logs.filter(l => l.d > Date.now() - days*86400000);
            if(filtered.length === 0) return alert("未有數據");
            document.getElementById('report-overlay').style.display = 'flex';
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { type: 'line', data: { labels: filtered.map(l => new Date(l.d).getDate() + '日'), datasets: [{label:'上壓', data: filtered.map(l=>l.r.split('/')[0]), borderColor:'red'}, {label:'下壓', data: filtered.map(l=>l.r.split('/')[1]), borderColor:'blue'}] }});
            document.getElementById('report-text').innerText = "最近數據：\n" + filtered.slice(-3).map(l => `${formatTime(l.d)}: ${l.r}`).join('\n');
            
            // 綁定分享功能
            document.getElementById('share-pdf-btn').onclick = () => sharePDF(days);
        }

        async function sharePDF(days) {
            const element = document.getElementById('report-content');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            
            // 1. 將 HTML 轉為 PDF Blob
            const opt = { margin: 10, filename: 'health_report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            const worker = html2pdf().from(element).set(opt);
            const pdfBlob = await worker.output('blob');

            // 2. 使用 Web Share API
            const file = new File([pdfBlob], `健康報告_${s.name || '長輩'}.pdf`, { type: 'application/pdf' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '健康報告',
                        text: `${s.name || '長輩'} 的血壓趨勢報告`
                    });
                } catch (err) {
                    console.error("分享失敗:", err);
                }
            } else {
                alert("此瀏覽器不支援直接分享檔案，已為你下載 PDF。");
                html2pdf().from(element).save();
            }
        }

        function closeReport() { document.getElementById('report-overlay').style.display = 'none'; }
        loadSets();
        updateStats();
    </script>
</body>
</html>
