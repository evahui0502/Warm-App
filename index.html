<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --wa-green: #25D366; --card-white: #FFFFFF; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .page { display: none; width: 100%; max-width: 480px; margin: auto; flex-direction: column; }
        .active { display: flex; }
        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; }
        .ai-bubble { font-size: 28px; border-left: 10px solid var(--primary-orange); padding-left: 15px; font-weight: bold; color: #333; }
        .btn-main { width: 100%; background: #87CEEB; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa { background: var(--wa-green) !important; }
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 12px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; }
        input { font-size: 28px; padding: 12px; border-radius: 12px; border: 2px solid #ddd; text-align: center; width: 40%; }
        
        /* 彈窗 */
        #chart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; }
        #report-content { background: white; padding: 20px; width: 85%; border-radius: 20px; text-align: center; }
        canvas { max-width: 100%; height: auto !important; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); font-size: 28px;">溫暖守護</h1>
            <button onclick="showPage('settings-page')" style="background:none; border:2px solid; padding:5px 10px; border-radius:8px;">⚙️ 設定</button>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨！</div>
            <div id="health-tip" class="health-status">載入中...</div>
            <div id="last-info" style="margin-top:10px; color:#666; font-weight:bold;">上次：未有紀錄</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 15px;">
                <div><label>上壓</label><br><input type="number" id="sys" placeholder="120"></div>
                <div><label>下壓</label><br><input type="number" id="dia" placeholder="80"></div>
            </div>
            <button class="btn-main" onclick="recordData()">✅ 記下血壓</button>
            <button class="btn-main btn-wa" onclick="sendToFamily()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn-main" style="flex:1; font-size:18px;" onclick="viewReport(7)">📊 周報</button>
            <button class="btn-main" style="flex:1; font-size:18px;" onclick="viewReport(30)">📅 月報</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')">⬅️ 返回</h2>
            <p>稱呼：<input type="text" id="u-name" style="width:90%"></p>
            <p>家人電話：<input type="tel" id="family-tel" style="width:90%"></p>
            <button class="btn-main" onclick="saveSettings()">💾 儲存</button>
        </div>
    </div>

    <div id="chart-modal">
        <div id="report-content">
            <h3 id="report-title" style="margin-top:0;">健康報告</h3>
            <canvas id="healthChart"></canvas>
            <div id="img-placeholder" style="display:none; margin-top:10px;">
                <p style="color:red; font-weight:bold;">長按圖片即可儲存並傳送：</p>
                <img id="out-img" style="width:100%; border:1px solid #ddd;">
            </div>
        </div>
        <button id="gen-btn" class="btn-main" style="width:85%; margin-top:15px; background:var(--wa-green);" onclick="captureReport()">🚀 生成圖片傳送</button>
        <button class="btn-main" style="width:85%; background:#666;" onclick="closeModal()">關閉</button>
    </div>

    <script>
        let chartInstance = null;

        // 穩定讀取：確保拿到的是最新 array
        function loadLogs() { 
            return JSON.parse(localStorage.getItem('warm_logs') || '[]').sort((a,b) => a.d - b.d); 
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(p === 'settings-page') {
                const s = JSON.parse(localStorage.getItem('warm_sets') || '{"name":"","familyTel":""}');
                document.getElementById('u-name').value = s.name;
                document.getElementById('family-tel').value = s.familyTel;
            }
            refreshUI();
        }

        function saveSettings() {
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value,
                familyTel: document.getElementById('family-tel').value
            }));
            showPage('home-page');
        }

        function recordData() {
            const s = parseInt(document.getElementById('sys').value);
            const d = parseInt(document.getElementById('dia').value);
            if(!s || !d) return alert("請輸入數字");
            
            let logs = loadLogs();
            logs.push({ sys: s, dia: d, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            refreshUI();
        }

        function refreshUI() {
            const logs = loadLogs();
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{"name":"長輩"}');
            const last = logs[logs.length - 1];
            
            document.getElementById('ai-msg').innerText = `早晨，${s.name}！`;
            if(last) {
                document.getElementById('last-info').innerText = `最新紀錄：${last.sys}/${last.dia}`;
                const isHigh = (last.sys > 140 || last.dia > 90);
                document.getElementById('health-tip').innerText = isHigh ? "⚠️ 血壓偏高，休息下再量" : "✨ 血壓好靚，繼續保持！";
                document.getElementById('health-tip').className = "health-status " + (isHigh ? "status-warn" : "status-normal");
            }
        }

        // --- 報平安修復：確保提取最新紀錄 ---
        function sendToFamily() {
            const logs = loadLogs();
            const todayStr = new Date().toDateString();
            const todayLogs = logs.filter(l => new Date(l.d).toDateString() === todayStr);

            if(todayLogs.length === 0) {
                return alert("今日仲未有紀錄，請先記下血壓數據。❤️");
            }

            const latest = todayLogs[todayLogs.length - 1]; // 絕對是今天最後一筆
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{"name":"長輩","familyTel":""}');
            let warn = (latest.sys > 140 || latest.dia > 90) ? " (⚠️ 數據偏高，我會休息下再量)" : "";
            const msg = `${s.name}最新血壓：${latest.sys}/${latest.dia}${warn}，放心！❤️`;
            
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        // --- 報表功能：加固 ---
        function viewReport(days) {
            const logs = loadLogs();
            const cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
            const data = logs.filter(l => l.d >= cutoff);
            if(data.length < 1) return alert("未有足夠數據");

            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('report-content').style.display = 'block';
            document.getElementById('img-placeholder').style.display = 'none';
            document.getElementById('gen-btn').style.display = 'block';

            const ctx = document.getElementById('healthChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(l => new Date(l.d).toLocaleDateString('zh-HK', {month:'numeric', day:'numeric'})),
                    datasets: [
                        { label: '上壓', data: data.map(l => l.sys), borderColor: '#FF4B2B', tension: 0.3 },
                        { label: '下壓', data: data.map(l => l.dia), borderColor: '#87CEEB', tension: 0.3 }
                    ]
                },
                options: { animation: false } // 關閉動畫，確保截圖完整
            });
        }

        async function captureReport() {
            const btn = document.getElementById('gen-btn');
            btn.innerText = "生成中...";
            
            setTimeout(async () => {
                const canvas = await html2canvas(document.querySelector("#report-content"));
                const imgData = canvas.toDataURL("image/png");
                
                document.getElementById('report-content').style.display = 'none';
                document.getElementById('img-placeholder').style.display = 'block';
                document.getElementById('out-img').src = imgData;
                btn.style.display = 'none';
                alert("圖片已生成！請長按圖片儲存，然後傳送給家人。");
            }, 500);
        }

        function closeModal() { document.getElementById('chart-modal').style.display = 'none'; }

        // 初次加載
        refreshUI();
    </script>
</body>
</html>
