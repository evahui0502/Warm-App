<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --wa-green: #25D366; --gold: #FFD700; --card-white: #FFFFFF; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        .card { background: var(--card-white); border-radius: 26px; padding: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 15px; width: calc(100% - 44px); }
        .ai-bubble { font-size: 30px; border-left: 10px solid var(--primary-orange); padding-left: 15px; font-weight: 900; color: #333; }
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; }
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 10px 15px; border-radius: 12px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; border: 2px solid #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; border: 2px solid #C62828; }
        input { font-size: 30px; padding: 12px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 42%; }
        
        /* 圖表分享專用彈窗 */
        #chart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; }
        #report-area { background: white; width: 85%; padding: 20px; border-radius: 20px; text-align: center; }
        #temp-image-container { margin-top: 10px; display: none; }
        #temp-image-container img { width: 100%; border-radius: 10px; border: 2px solid var(--wa-green); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 30px;">溫暖守護</h1>
            <div style="color: var(--primary-orange); font-weight: bold; border: 2px solid; padding: 6px 12px; border-radius: 10px; cursor: pointer;" onclick="showPage('settings-page')">⚙️ 設定</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="health-tip" class="health-status">載入中...</div>
            <div id="last-record" style="margin-top:10px; font-size:18px; color:#777;">上次紀錄：--/--</div>
        </div>

        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-around; margin-bottom: 10px;">
                <div><label>上壓</label><br><input type="number" id="sys" placeholder="120"></div>
                <div><label>下壓</label><br><input type="number" id="dia" placeholder="80"></div>
            </div>
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="handleQuickShare()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-main" style="flex:1; font-size:18px;" onclick="openChart(7)">📊 周報</button>
            <button class="btn-main" style="flex:1; font-size:18px;" onclick="openChart(30)">📅 月報</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card">
            <h2 onclick="showPage('home-page')">⬅️ 返回</h2>
            <p>稱呼：<input type="text" id="u-name" style="width:90%"></p>
            <p>家人 WhatsApp：<input type="tel" id="family-tel" style="width:90%"></p>
            <button class="btn-main" onclick="saveSets()">儲存</button>
        </div>
    </div>

    <div id="chart-modal">
        <div id="report-area">
            <h3 id="chart-title" style="margin:5px; color:var(--primary-orange);">健康報告</h3>
            <canvas id="healthChart"></canvas>
            <p id="share-instr" style="font-size:14px; color:#666;">點擊下方按鈕分享</p>
        </div>
        
        <div id="temp-image-container">
            <p style="color:white;">長按圖片即可儲存並傳送：</p>
            <img id="final-report-img" src="">
        </div>

        <button id="share-btn" class="btn-main" style="margin-top:15px; width:80%; background:var(--wa-green);" onclick="generateAndShare()">🚀 生成並分享圖片</button>
        <button class="btn-main" style="width:80%; background:#666;" onclick="closeChart()">關閉</button>
    </div>

    <script>
        let myChart = null;

        function getSets() { return JSON.parse(localStorage.getItem('warm_sets') || '{"name":"長輩","familyTel":""}'); }
        function getLogs() { 
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            // 確保按時間排序，最後一筆就是最新的
            return logs.sort((a,b) => a.d - b.d);
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            updateStats();
        }

        function saveSets() {
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value,
                familyTel: document.getElementById('family-tel').value
            }));
            showPage('home-page');
        }

        function logBP() {
            const s = parseInt(document.getElementById('sys').value);
            const d = parseInt(document.getElementById('dia').value);
            if(!s || !d) return alert("請先輸入數字");
            let logs = getLogs();
            logs.push({ sys: s, dia: d, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            document.getElementById('sys').value = ''; document.getElementById('dia').value = '';
            alert("記好喇！❤️");
            updateStats();
        }

        function updateStats() {
            const logs = getLogs();
            const s = getSets();
            const last = logs[logs.length - 1]; // 獲取排序後的最新的紀錄
            const tipEl = document.getElementById('health-tip');
            
            if(last) {
                document.getElementById('last-record').innerText = `最新紀錄：${last.sys}/${last.dia}`;
                if(last.sys > 140 || last.dia > 90) {
                    tipEl.innerText = "⚠️ 血壓偏高，休息下再量";
                    tipEl.className = "health-status status-warn";
                } else {
                    tipEl.innerText = "✨ 血壓好靚，繼續保持！";
                    tipEl.className = "health-status status-normal";
                }
            }
            document.getElementById('ai-msg').innerText = `早晨，${s.name}！`;
        }

        // --- 報平安修復：確保提取最新一次 ---
        function handleQuickShare() {
            const logs = getLogs();
            const todayStr = new Date().toDateString();
            // 找今天最後一筆紀錄
            const todayLogs = logs.filter(l => new Date(l.d).toDateString() === todayStr);
            
            if(todayLogs.length === 0) {
                alert("今日仲未有紀錄喎！請先記下血壓數據。❤️");
            } else {
                const latest = todayLogs[todayLogs.length - 1];
                const s = getSets();
                let alertMsg = (latest.sys > 140 || latest.dia > 90) ? " (⚠️ 數據偏高，我會休息下再量)" : "";
                const msg = `${s.name}最新血壓：${latest.sys}/${latest.dia}${alertMsg}，放心！❤️`;
                window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
            }
        }

        // --- 圖表與分享修復 ---
        function openChart(days) {
            const logs = getLogs();
            const cutoff = Date.now() - (days * 86400000);
            const data = logs.filter(l => l.d >= cutoff);
            if(data.length < 1) return alert("未有數據");

            document.getElementById('chart-modal').style.display = 'flex';
            document.getElementById('report-area').style.display = 'block';
            document.getElementById('temp-image-container').style.display = 'none';
            document.getElementById('share-btn').style.display = 'block';

            const ctx = document.getElementById('healthChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(l => new Date(l.d).toLocaleDateString('zh-HK', {month:'numeric', day:'numeric'})),
                    datasets: [
                        { label: '上壓', data: data.map(l => l.sys), borderColor: '#FF4B2B', tension: 0.3 },
                        { label: '下壓', data: data.map(l => l.dia), borderColor: '#87CEEB', tension: 0.3 }
                    ]
                }
            });
        }

        async function generateAndShare() {
            const area = document.querySelector("#report-area");
            const canvas = await html2canvas(area);
            const imgData = canvas.toDataURL("image/png");
            
            // 嘗試使用系統分享功能 (iOS/Android Chrome 支援)
            if (navigator.share && navigator.canShare) {
                const blob = await (await fetch(imgData)).blob();
                const file = new File([blob], "health_report.png", { type: "image/png" });
                try {
                    await navigator.share({
                        files: [file],
                        title: '健康報告',
                        text: '這是我的血壓報告'
                    });
                    return;
                } catch (err) { console.log("分享取消或失敗"); }
            }

            // 如果系統分享不支援，改為顯示圖片讓長輩手動儲存
            document.getElementById('report-area').style.display = 'none';
            document.getElementById('temp-image-container').style.display = 'block';
            document
