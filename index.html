<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF8C00">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/822/822102.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --accent-blue: #87CEEB; --sos-red: #FF4B2B; --card-white: #FFFFFF; --wa-green: #25D366; --warn-red: #d32f2f; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .page { display: none; width: 100%; max-width: 480px; flex-direction: column; }
        .active { display: flex; }
        
        /* 強化首頁框架 */
        .header-row { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-settings-text { color: var(--primary-orange); font-weight: bold; font-size: 20px; border: 2px solid var(--primary-orange); padding: 5px 15px; border-radius: 12px; background: white; }

        .card { background: var(--card-white); border-radius: 24px; padding: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); margin-bottom: 20px; width: calc(100% - 50px); }
        
        /* 放大問候語區域 */
        .ai-bubble { font-size: 30px; border-left: 8px solid var(--primary-orange); padding-left: 15px; margin-bottom: 12px; font-weight: 900; color: #333; line-height: 1.3; }
        .last-record-box { background: #FFF9E6; padding: 10px 15px; border-radius: 12px; color: var(--primary-orange); font-weight: bold; font-size: 20px; border: 1px dashed var(--primary-orange); }

        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #555; }
        input { font-size: 32px; padding: 15px; border-radius: 15px; border: 3px solid var(--accent-blue); text-align: center; width: 85%; align-self: center; }
        
        .btn-main { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 20px; border-radius: 18px; font-size: 24px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .btn-wa-main { background: var(--wa-green) !important; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        .btn-report { background: white; border: 3px solid var(--primary-orange); color: var(--primary-orange); padding: 18px; border-radius: 15px; font-size: 20px; font-weight: bold; flex: 1; }

        .warning-text { color: var(--warn-red); font-weight: bold; font-size: 18px; margin-bottom: 15px; display: none; text-align: center; background: #ffebee; padding: 10px; border-radius: 10px; }

        #report-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        #report-content { background: white; width: 88%; max-width: 420px; padding: 25px; border-radius: 25px; }
        
        .sos-btn { position: fixed; bottom: 30px; right: 25px; width: 100px; height: 100px; background: var(--sos-red); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: 900; z-index: 100; box-shadow: 0 10px 25px rgba(255,75,43,0.5); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="header-row">
            <h1 style="color: var(--primary-orange); margin: 0; font-size: 32px;">溫暖守護</h1>
            <div class="btn-settings-text" onclick="showPage('settings-page')">⚙️ 設定中心</div>
        </div>

        <div class="card">
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="last-record-time" class="last-record-box">載入數據中...</div>
            <div id="quick-stats" style="color:#888; font-size: 16px; margin-top: 10px;">本週已紀錄 0 次數據</div>
        </div>

        <div class="card">
            <div class="input-row">
                <div class="input-group">
                    <label>上壓 (收縮壓)</label>
                    <input type="number" id="sys" placeholder="120" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>下壓 (舒張壓)</label>
                    <input type="number" id="dia" placeholder="80" inputmode="numeric">
                </div>
            </div>
            <div id="bp-warning" class="warning-text">⚠️ 數值偏高，請休息下再量一次。</div>
            
            <button class="btn-main" onclick="logBP()">✅ 記下數據</button>
            <button class="btn-main btn-wa-main" onclick="quickShareToday()">💬 即時回報今日數據</button>
        </div>

        <div style="display:flex; gap:15px; width:100%;">
            <button class="btn-report" onclick="openReport(7)">📊 一週圖表</button>
            <button class="btn-report" onclick="openReport(30)">📅 月報預覽</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="header-row">
            <h2 style="margin:0; font-size:28px;" onclick="showPage('home-page')">⬅️ 返回主頁</h2>
        </div>
        <div class="card">
            <h3 style="color: var(--primary-orange); margin-top:0;">設定個人資料</h3>
            <label style="display:block; margin-bottom:8px; font-weight:bold;">您的稱呼</label>
            <input type="text" id="u-name" style="width:90%; font-size:22px; margin-bottom:20px;" placeholder="例如：陳伯">
            
            <label style="display:block; margin-bottom:8px; font-weight:bold;">緊急求助電話</label>
            <input type="tel" id="sos-tel" style="width:90%; font-size:22px; margin-bottom:20px;" placeholder="999">
            
            <button class="btn-main" style="background:#4CAF50" onclick="saveSets()">💾 儲存設定</button>
        </div>
    </div>

    <div id="report-overlay">
        <div id="report-content">
            <h3 id="report-title" style="text-align:center; font-size:24px; color: var(--primary-orange);">健康趨勢</h3>
            <canvas id="bpChart"></canvas>
            <div id="report-text" style="font-size:16px; background:#f9f9f9; padding:15px; margin-top:15px; border-radius:12px;"></div>
            <button id="share-pdf-btn" class="btn-main btn-wa-main" style="margin-top:20px;">📄 一鍵發送 PDF 報告</button>
            <button class="btn-main" style="background:#888" onclick="closeReport()">返回</button>
        </div>
    </div>

    <div id="sos" class="sos-btn" onclick="triggerSOS()">SOS</div>

    <script>
        let myChart = null;

        function formatFriendly(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diff = Math.floor((new Date(now.getFullYear(), now.getMonth(), now.getDate()) - new Date(d.getFullYear(), d.getMonth(), d.getDate())) / 86400000);
            const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (diff === 0) return `今日 ${time}`;
            if (diff === 1) return `尋日 ${time}`;
            return `${d.getMonth()+1}月${d.getDate()}日 ${time}`;
        }

        function showPage(p) { 
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); 
            if(p==='settings-page') loadSets(); 
            updateStats();
        }

        function saveSets() { 
            localStorage.setItem('warm_sets', JSON.stringify({
                name: document.getElementById('u-name').value, 
                tel: document.getElementById('sos-tel').value
            })); 
            alert("設定已更新！"); 
            showPage('home-page'); 
        }

        function loadSets() { 
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}'); 
            document.getElementById('u-name').value = s.name || ''; 
            document.getElementById('sos-tel').value = s.tel || '999'; 
        }

        function logBP() {
            const sys = parseInt(document.getElementById('sys').value);
            const dia = parseInt(document.getElementById('dia').value);
            const warn = document.getElementById('bp-warning');
            
            if(!sys || !dia) return alert("請輸入完整數據");

            // 異常偵測 (上壓 > 140 或 下壓 > 90)
            if(sys >= 140 || dia >= 90) {
                warn.style.display = 'block';
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else {
                warn.style.display = 'none';
            }

            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            // 修正：sys 為上壓，dia 為下壓，順序統一
            logs.push({sys: sys, dia: dia, d: Date.now()});
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = ''; 
            document.getElementById('dia').value = '';
            updateStats();
        }

        function updateStats() {
            let logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            let week = logs.filter(l=>l.d > Date.now()-7*86400000);
            document.getElementById('quick-stats').innerText = `本週已紀錄 ${week.length} 次數據`;
            
            const last = logs[logs.length-1];
            if(last) {
                document.getElementById('last-record-time').innerText = `最後：${formatFriendly(last.d)} (血壓 ${last.sys}/${last.dia})`;
                document.getElementById('ai-msg').innerText = `記低咗喇${s.name || ''}！`;
            } else {
                document.getElementById('last-record-time').innerText = "尚未有紀錄";
                document.getElementById('ai-msg').innerText = `早晨呀${s.name || ''}！`;
            }
        }

        function quickShareToday() {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const last = logs[logs.length-1];
            if(!last) return alert("仲未有紀錄");
            const msg = `【溫暖守護】今日回報\n${s.name || '長輩'} 最新血壓：${last.sys}/${last.dia}\n時間：${formatFriendly(last.d)}\n身體感覺良好！`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        }

        function openReport(days) {
            const logs = JSON.parse(localStorage.getItem('warm_logs') || '[]');
            const filtered = logs.filter(l => l.d > Date.now() - days*86400000);
            if(filtered.length === 0) return alert("未有數據");
            document.getElementById('report-overlay').style.display = 'flex';
            const ctx = document.getElementById('bpChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, { 
                type: 'line', 
                data: { 
                    labels: filtered.map(l => new Date(l.d).getDate() + '日'), 
                    datasets: [
                        {label:'上壓', data: filtered.map(l=>l.sys), borderColor:'red', tension: 0.3}, 
                        {label:'下壓', data: filtered.map(l=>l.dia), borderColor:'blue', tension: 0.3}
                    ] 
                }
            });
            document.getElementById('report-text').innerText = "近期數值：\n" + filtered.slice(-3).map(l => `${formatFriendly(l.d)}: ${l.sys}/${l.dia}`).join('\n');
            document.getElementById('share-pdf-btn').onclick = () => sharePDF(filtered);
        }

        async function sharePDF() {
            const element = document.getElementById('report-content');
            const s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            const opt = { margin: 10, filename: 'report.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } };
            const pdfBlob = await html2pdf().from(element).set(opt).output('blob');
            const file = new File([pdfBlob], `健康報告_${s.name || '長輩'}.pdf`, { type: 'application/pdf' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: '健康報告', text: `${s.name || '長輩'} 的健康趨勢。` });
            } else {
                html2pdf().from(element).save();
                alert("已為你下載 PDF 報告。");
            }
        }

        function triggerSOS() {
            let s = JSON.parse(localStorage.getItem('warm_sets') || '{}');
            if(confirm("確定要撥打緊急求助電話嗎？")) window.location.href = `tel:${s.tel || '999'}`;
        }

        function closeReport() { document.getElementById('report-overlay').style.display = 'none'; }
        
        loadSets();
        updateStats();
    </script>
</body>
</html>
