<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>溫暖守護</title>
    <style>
        :root { --bg-color: #FFFDD0; --primary-orange: #FF8C00; --wa-green: #25D366; --gold: #FFD700; --card-white: #FFFFFF; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .page { display: none; width: 100%; max-width: 480px; margin: auto; flex-direction: column; }
        .active { display: flex; }
        
        /* 勳章與卡片 */
        .streak-badge { background: linear-gradient(135deg, var(--gold), #FFA500); color: #8B4513; padding: 10px 20px; border-radius: 50px; font-weight: 900; font-size: 20px; display: inline-flex; align-items: center; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(255,215,0,0.2); align-self: flex-start; }
        .card { background: var(--card-white); border-radius: 25px; padding: 25px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid rgba(255,140,0,0.1); }
        .ai-bubble { font-size: 32px; border-left: 10px solid var(--primary-orange); padding-left: 15px; font-weight: bold; line-height: 1.3; color: #333; }
        
        /* 輸入與按鈕 */
        .input-group { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1; text-align: center; }
        label { display: block; font-size: 22px; font-weight: bold; color: var(--primary-orange); margin-bottom: 8px; }
        input { font-size: 32px; padding: 15px 0; border-radius: 15px; border: 3px solid #EEE; text-align: center; background: #FAFAFA; width: 100%; }
        input:focus { border-color: var(--primary-orange); background: #FFF; outline: none; }

        .btn-main { width: 100%; color: white; border: none; padding: 20px; border-radius: 20px; font-size: 26px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
        .btn-record { background: #87CEEB; }
        .btn-wa { background: var(--wa-green); }
        
        .health-status { font-size: 20px; font-weight: bold; margin-top: 10px; padding: 10px 15px; border-radius: 12px; display: inline-block; }
        .status-normal { background: #E8F5E9; color: #2E7D32; }
        .status-warn { background: #FFEBEE; color: #C62828; }

        .btn-sub { flex: 1; background: white; border: 2px solid #DDD; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h1 style="color: var(--primary-orange); font-size: 28px; margin:0;">溫暖守護</h1>
            <button onclick="showPage('settings-page')" style="background: white; border:2px solid var(--primary-orange); color: var(--primary-orange); padding:8px 15px; border-radius:12px; font-size:18px; font-weight:bold;">⚙️ 設定</button>
        </div>

        <div class="card">
            <div id="streak-box" class="streak-badge">🔥 連續紀錄 0 天</div>
            <div id="ai-msg" class="ai-bubble">早晨呀！</div>
            <div id="health-tip" class="health-status">載入中...</div>
            <div id="last-info" style="margin-top:10px; color:#666; font-size:18px;">尚未有紀錄</div>
        </div>

        <div class="card">
            <div class="input-group">
                <div class="input-box">
                    <label>上壓</label>
                    <input type="number" id="sys" placeholder="0" oninput="if(value.length>=3)document.getElementById('dia').focus()">
                </div>
                <div class="input-box">
                    <label>下壓</label>
                    <input type="number" id="dia" placeholder="0">
                </div>
            </div>
            <button class="btn-main btn-record" onclick="doRecord()">✅ 記下血壓</button>
            <button class="btn-main btn-wa" onclick="doWhatsApp()">💬 報平安</button>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn-sub" onclick="sendReport(7)">📊 傳送周報</button>
            <button class="btn-sub" onclick="sendReport(30)">📅 傳送月報</button>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="card" style="min-height: 85vh;">
            <h2 onclick="showPage('home-page')" style="color:var(--primary-orange); cursor:pointer; font-size:28px; margin-bottom:30px;">⬅️ 返回主頁</h2>
            
            <label style="color:#333; text-align:left;">您的稱呼：</label>
            <input type="text" id="u-name" style="margin-bottom:25px; text-align:left; padding-left:15px; width:90%;">
            
            <label style="color:#333; text-align:left;">家人 WhatsApp 電話：</label>
            <input type="tel" id="family-tel" style="margin-bottom:25px; text-align:left; padding-left:15px; width:90%;">
            
            <button class="btn-main" style="background:#4CAF50; margin-top:20px;" onclick="doSave()">💾 儲存設定</button>
        </div>
    </div>

    <script>
        const getL = () => JSON.parse(localStorage.getItem('warm_logs') || '[]').sort((a,b) => a.d - b.d);
        const getS = () => JSON.parse(localStorage.getItem('warm_sets') || '{"name":"用戶","familyTel":""}');

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(p === 'settings-page') {
                const s = getS();
                document.getElementById('u-name').value = s.name;
                document.getElementById('family-tel').value = s.familyTel;
            }
            ui();
        }

        function doSave() {
            const name = document.getElementById('u-name').value;
            const tel = document.getElementById('family-tel').value;
            if(!name || !tel) return alert("請填寫完整喔！❤️");
            localStorage.setItem('warm_sets', JSON.stringify({ name, familyTel: tel }));
            alert("儲存成功！✨");
            showPage('home-page');
        }

        function doRecord() {
            const s = parseInt(document.getElementById('sys').value);
            const d = parseInt(document.getElementById('dia').value);
            if(!s || !d) return alert("請輸入血壓數字。❤️");
            
            let logs = getL();
            logs.push({ sys: s, dia: d, d: Date.now() });
            localStorage.setItem('warm_logs', JSON.stringify(logs));
            
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            
            // 回復小彈窗
            alert("記好喇！❤️");
            ui();
        }

        function ui() {
            const logs = getL();
            const s = getS();
            const last = logs[logs.length - 1];
            
            let streak = 0; let check = new Date();
            const logDates = new Set(logs.map(l => new Date(l.d).toDateString()));
            while(logDates.has(check.toDateString())) { streak++; check.setDate(check.getDate() - 1); }
            
            document.getElementById('streak-box').innerText = `🔥 連續紀錄 ${streak} 天`;
            document.getElementById('ai-msg').innerText = `早晨，${s.name || '您'}！`;
            
            if(last) {
                document.getElementById('last-info').innerText = `上次紀錄：${last.sys} / ${last.dia}`;
                const isH = (last.sys > 140 || last.dia > 90);
                document.getElementById('health-tip').innerText = isH ? "⚠️ 血壓偏高，休息一下再量" : "✨ 血壓好靚，繼續保持！";
                document.getElementById('health-tip').className = "health-status " + (isH ? "status-warn" : "status-normal");
            }
        }

        function doWhatsApp() {
            const logs = getL();
            const todayLogs = logs.filter(l => new Date(l.d).toDateString() === new Date().toDateString());
            if(todayLogs.length === 0) return alert("今日仲未有紀錄喔！");
            const latest = todayLogs[todayLogs.length - 1];
            const s = getS();
            if(!s.familyTel) return alert("請先到設定輸入電話。");
            
            const msg = `${s.name}今日血壓：${latest.sys}/${latest.dia}${ (latest.sys > 140 || latest.dia > 90) ? " (⚠️ 數據偏高)" : "" }，放心！❤️`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        function sendReport(days) {
            const logs = getL();
            const s = getS();
            const data = logs.filter(l => l.d >= Date.now() - (days * 86400000));
            if(data.length === 0) return alert("暫時未有數據喔。");

            let msg = `📊 ${s.name} 的健康${days==7?'週':'月'}報表：\n`;
            msg += `--------------------\n`;
            data.forEach(l => {
                const d = new Date(l.d).toLocaleDateString('zh-HK', {month:'short', day:'numeric'});
                msg += `${d}: ${l.sys}/${l.dia}\n`;
            });
            msg += `--------------------\n祝身體健康！❤️`;
            window.open(`https://wa.me/${s.familyTel}?text=${encodeURIComponent(msg)}`);
        }

        ui();
    </script>
</body>
</html>
